<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultations – MediConnectX Doctor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 0; background-color: #f0f8ff; color: #333; }

    /* ── Navbar ── */
    .navbar {
      background-color: #012b40; padding: 1rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; position: sticky; top: 0; z-index: 1000;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .logo { color: #fff; font-size: 1.4rem; font-weight: 700; white-space: nowrap; letter-spacing: 0.01em; }
    .hamburger { display: none; background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; padding: 0; line-height: 1; }
    .nav-links { list-style: none; display: flex; gap: 0.25rem; align-items: center; }
    .nav-links a { color: rgba(255,255,255,0.88); text-decoration: none; font-size: 0.95rem; padding: 6px 15px; border-radius: 20px; transition: background 0.2s, color 0.2s; white-space: nowrap; letter-spacing: 0.02em; }
    .nav-links a:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-links a.nav-active { background: rgba(255,255,255,0.28); color: #fff; font-weight: 600; }
    @media(max-width:768px){
      .logo{font-size:1.1rem;} .hamburger{display:block;}
      .navbar nav{position:absolute;top:100%;left:0;width:100%;z-index:99;}
      .nav-links{display:none;flex-direction:column;background:#012b40;padding:0.8rem 1.5rem;gap:0;box-shadow:0 4px 8px rgba(0,0,0,0.3);}
      .nav-links.open{display:flex;}
      .nav-links li{border-bottom:1px solid rgba(255,255,255,0.1);}
      .nav-links li:last-child{border-bottom:none;}
      .nav-links a{display:block;padding:0.65rem 0;}
      .page-header h1{font-size:1.7rem;}
      .page-header{padding:36px 16px;}
    }

    /* ── Page header ── */
    .page-header {
      background: linear-gradient(to right, rgba(0,85,128,0.85), rgba(0,40,80,0.85)),
        url("images/MainPageImage.jpg") center/cover;
      color: white; text-align: center; padding: 50px 20px;
    }
    .page-header h1 { font-size: 2.4rem; font-weight: 700; margin-bottom: 10px; }
    .page-header p  { font-size: 1.05rem; font-weight: 300; }

    .main-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 16px 60px; }

    /* ── Section title ── */
    .sec-title { font-size: 1.25rem; font-weight: 700; color: #005580; margin-bottom: 18px; border-left: 4px solid #0059a3; padding-left: 12px; }

    /* ── Table card ── */
    .table-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.1); overflow: hidden; }
    .table-card-head {
      background: #01486b; color: #fff; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .table-card-head h5 { margin: 0; font-weight: 700; font-size: 1rem; }

    .badge-pending   { background:#f39c12; color:#fff; padding:3px 10px; border-radius:10px; font-size:.78rem; }
    .badge-booked    { background:#27ae60; color:#fff; padding:3px 10px; border-radius:10px; font-size:.78rem; }
    .badge-completed { background:#2980b9; color:#fff; padding:3px 10px; border-radius:10px; font-size:.78rem; }
    .badge-cancelled { background:#e74c3c; color:#fff; padding:3px 10px; border-radius:10px; font-size:.78rem; }
    .badge-missed    { background:#795548; color:#fff; padding:3px 10px; border-radius:10px; font-size:.78rem; }

    /* ── Prescription modal ── */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 2000;
      align-items: center; justify-content: center;
    }
    .modal-bg.show { display: flex; }
    .modal-box { background: #fff; border-radius: 14px; padding: 28px 30px; width: 90%; max-width: 400px; }
    .modal-box h5 { color: #005580; margin-bottom: 16px; font-size: 1.1rem; }

    footer { background-color: #012b40; color: #fff; text-align: center; padding: 18px; margin-top: 40px; }
  </style>
</head>
<body>

  <div id="navbar-root"></div>
  <script src="navbar.js"></script>

  <div class="page-header">
    <h1>My Online Consultations</h1>
    <p>View your booked appointments, join video calls and upload prescriptions post-consultation.</p>
  </div>

  <div class="main-wrap">
    <p class="sec-title"><i class="bi bi-camera-video me-2"></i>Online Consultation Schedule</p>
    <div class="table-card">
      <div class="table-card-head">
        <h5><i class="bi bi-camera-video"></i> Appointment Schedule</h5>
        <span id="aptCount" class="badge bg-secondary">—</span>
      </div>
      <div id="aptWrap">
        <div class="text-muted p-4 text-center">Loading consultations…</div>
      </div>
    </div>

  </div>

  <footer><p>© 2026 MediConnectX – Smart Medical Management System. All Rights Reserved.</p></footer>

  <!-- E-Prescription modal -->
  <div class="modal-bg" id="ePrescModal">
    <div class="modal-box" style="max-width:580px;max-height:92vh;overflow-y:auto;">
      <h5 style="margin-bottom:14px;"><i class="bi bi-file-earmark-medical me-2"></i>Write E-Prescription</h5>
      <input type="hidden" id="ePrescAptId" />
      <div id="ePrescHeader" style="background:#e8f4ff;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:0.88rem;color:#333;"></div>

      <!-- Medicine search -->
      <div style="position:relative;margin-bottom:10px;">
        <label style="font-weight:600;font-size:0.82rem;color:#005580;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px;">Search Medicine *</label>
        <input type="text" class="form-control" id="medSearchInput" placeholder="Type medicine name…" autocomplete="off" oninput="handleMedSearch()" />
        <div id="medSearchDrop" style="display:none;position:absolute;z-index:100;background:#fff;border:1.5px solid #c8e0f0;border-radius:8px;width:100%;max-height:180px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.12);"></div>
      </div>
      <div id="selectedMedBadge" style="display:none;background:#e8f4ff;border-radius:6px;padding:6px 12px;margin-bottom:10px;font-size:0.88rem;color:#005580;font-weight:600;"></div>

      <!-- Rx fields -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div>
          <label style="font-size:0.78rem;font-weight:700;color:#555;display:block;margin-bottom:4px;">Dosage *</label>
          <input type="text" class="form-control" id="ePrescDosage" placeholder="e.g. 500mg" />
        </div>
        <div>
          <label style="font-size:0.78rem;font-weight:700;color:#555;display:block;margin-bottom:4px;">Frequency *</label>
          <select class="form-select" id="ePrescFreq">
            <option>Once daily</option><option>Twice daily</option><option>Three times daily</option>
            <option>Four times daily</option><option>Every 8 hours</option><option>Every 6 hours</option>
            <option>Before meals</option><option>After meals</option><option>As needed</option>
          </select>
        </div>
        <div>
          <label style="font-size:0.78rem;font-weight:700;color:#555;display:block;margin-bottom:4px;">Duration *</label>
          <input type="text" class="form-control" id="ePrescDuration" placeholder="e.g. 7 days" />
        </div>
        <div>
          <label style="font-size:0.78rem;font-weight:700;color:#555;display:block;margin-bottom:4px;">Qty</label>
          <input type="number" class="form-control" id="ePrescQty" placeholder="14" min="1" />
        </div>
      </div>
      <div style="margin-bottom:10px;">
        <label style="font-size:0.78rem;font-weight:700;color:#555;display:block;margin-bottom:4px;">Instructions</label>
        <input type="text" class="form-control" id="ePrescInst" placeholder="e.g. Take with water after food" />
      </div>
      <div style="margin-bottom:14px;">
        <label style="font-size:0.78rem;font-weight:700;color:#555;display:block;margin-bottom:4px;">Warnings</label>
        <input type="text" class="form-control" id="ePrescWarn" placeholder="e.g. Avoid alcohol" />
      </div>

      <button class="btn w-100 mb-3" style="background:#01486b;color:#fff;font-weight:600;" onclick="addMedToRx()">
        <i class="bi bi-plus-circle me-1"></i> Add Medicine to Prescription
      </button>
      <div id="ePrescList" style="margin-bottom:14px;"></div>

      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary flex-fill" id="ePrescSubmitBtn" onclick="submitEPrescription()" disabled>
          <i class="bi bi-send me-1"></i> Issue Prescription
        </button>
        <button class="btn btn-secondary flex-fill" onclick="closeEPrescModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="customModal.js"></script>
  <script>
    const auth = requireAuth('DOCTOR');

    // Global variables to store appointment data for confirmation dialogs
    let globalAppointments = [];
    let globalPatientNames = {};
    let doctorConsultationFee = 500; // Will be fetched from doctor profile

    async function loadAppointments() {
      try {
        // Fetch doctor's own consultation fee using the correct endpoint
        try {
          const docProfile = await apiGet('/api/doctor/search?id=' + auth.roleId);
          console.log('Doctor profile fetched:', docProfile);

          if (docProfile) {
            // Handle both integer and string consultation fee
            let fee = docProfile.consultationFee;
            if (fee) {
              if (typeof fee === 'string') {
                fee = parseInt(fee, 10);
              }
              if (!isNaN(fee) && fee > 0) {
                doctorConsultationFee = fee;
                console.log('Doctor consultation fee set to: ₹' + doctorConsultationFee);
              }
            }
          }
        } catch (e) {
          console.log('Could not fetch doctor fee, using default ₹500', e);
        }

        const list = await apiGet('/api/appointments/doctor?doctorId=' + auth.roleId);
        document.getElementById('aptCount').textContent = list.length;

        if (!list.length) {
          document.getElementById('aptWrap').innerHTML =
            '<p class="text-muted p-4 text-center">No consultations booked yet.</p>';
          return;
        }

        // Resolve patient names in parallel
        const patNames = {};
        await Promise.all([...new Set(list.map(a => a.patientId))].map(async id => {
          try {
            const p = await apiGet('/api/patient/profile/search?id=' + id);
            patNames[id] = p.name || ('Patient #' + id);
          } catch { patNames[id] = 'Patient #' + id; }
        }));

        // Store globally for use in confirmation dialogs
        globalAppointments = list;
        globalPatientNames = patNames;

        const rows = list.map(a => {
          const badge = statusBadge(a.status);
          const aptTime = a.appointmentTime
            ? parseAptTime(a.appointmentTime).toLocaleString('en-IN', {dateStyle:'medium', timeStyle:'short'})
            : '—';

          // True while the "Opens in …" countdown is showing (> 10 min before the call)
          const isCallPending = a.status === 'BOOKED' && a.appointmentTime
            ? (parseAptTime(a.appointmentTime) - new Date()) > 10 * 60 * 1000
            : false;

          const joinBtn = a.status === 'BOOKED' ? buildJoinBtn(a.id, a.appointmentTime) : '';

          // Complete is only allowed once the call window opens
          const completeBtn = a.status === 'BOOKED'
            ? isCallPending
              ? `<button class="btn btn-sm btn-outline-secondary ms-1" disabled
                   title="Available once Join Call opens (10 min before appointment)">
                   <i class="bi bi-check-circle"></i> Complete</button>`
              : `<button class="btn btn-sm btn-outline-primary ms-1" onclick="markComplete(${a.id})">
                   <i class="bi bi-check-circle"></i> Complete</button>`
            : '';

          const prescBtn = (a.status === 'BOOKED' || a.status === 'COMPLETED')
            ? (a.status === 'BOOKED' && isCallPending)
              ? `<button class="btn btn-sm btn-outline-secondary ms-1" disabled
                   title="Available once Join Call opens (10 min before appointment)">
                   <i class="bi bi-file-earmark-plus"></i> E-Rx</button>`
              : `<button class="btn btn-sm btn-outline-info ms-1" onclick="openEPrescModal(${a.id}, '${(patNames[a.patientId] || 'Patient').replace(/'/g, "\\'")}')">
                   <i class="bi bi-file-earmark-plus"></i> E-Rx</button>`
            : '';

          // FEAT-01 fix: Show cancel button ONLY when JOIN CALL button is NOT visible
          // (i.e., appointment is more than 10 minutes away)
          // For BOOKED: show cancel ONLY if call is still pending (> 10 min away)
          // For PENDING_PAYMENT: always allow cancel (payment window is short)
          const shouldShowCancel = a.status === 'PENDING_PAYMENT'
            ? true
            : (a.status === 'BOOKED' && isCallPending);
          const cancelBtn = shouldShowCancel
            ? `<button class="btn btn-sm btn-outline-danger ms-1" onclick="confirmCancel(${a.id})">
                 <i class="bi bi-x-circle"></i> Cancel</button>`
            : '';

          return `<tr>
            <td>${a.id}</td>
            <td>${patNames[a.patientId] || '—'}</td>
            <td>${aptTime}</td>
            <td>${badge}</td>
            <td>${a.transactionId || '—'}</td>
            <td style="white-space:nowrap;">${joinBtn}${completeBtn}${prescBtn}${cancelBtn}</td>
          </tr>`;
        }).join('');

        document.getElementById('aptWrap').innerHTML = `
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead style="background:#01486b;color:#fff;">
                <tr><th>ID</th><th>Patient</th><th>Date &amp; Time</th><th>Status</th><th>Txn ID</th><th>Actions</th></tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      } catch (e) {
        document.getElementById('aptWrap').innerHTML =
          '<p class="text-danger p-4 text-center">Failed to load appointments.</p>';
      }
    }

    // ── Dynamic Join Call button ──────────────────────────────────────
    function buildJoinBtn(aptId, rawTime) {
      if (!rawTime) return '';
      const aptDate    = parseAptTime(rawTime);
      const now        = new Date();
      const diffMs     = aptDate - now;
      const tenMin     = 10 * 60 * 1000;
      const fifteenMin = 15 * 60 * 1000;

      // Slot window fully elapsed — backend scheduler will mark MISSED.
      // Return nothing to avoid a stale Join Call during the brief scheduler lag.
      if (diffMs < -fifteenMin) return '';

      if (diffMs > tenMin) {
        const totalMins = Math.ceil(diffMs / 60000);
        const h = Math.floor(totalMins / 60);
        const m = totalMins % 60;
        const label = h > 0 ? `Opens in ${h}h ${m}m` : `Opens in ${m}m`;
        return `<button class="btn btn-sm btn-secondary ms-1" disabled
                  data-countdown="${aptDate.getTime()}"
                  title="Join Call available 10 minutes before the appointment">
                  <i class="bi bi-camera-video"></i> <span class="cd-label">${label}</span></button>`;
      }
      return `<a href="Room.html?appointmentId=${aptId}" class="btn btn-sm btn-success ms-1">
                <i class="bi bi-camera-video-fill"></i> Join Call</a>`;
    }

    // Handles both ISO string "2026-05-20T10:00:00" and legacy array [2026,5,20,10,0]
    function parseAptTime(val) {
      if (!val) return new Date(NaN);
      if (Array.isArray(val)) {
        return new Date(val[0], val[1] - 1, val[2], val[3] || 0, val[4] || 0, val[5] || 0);
      }
      return new Date(val);
    }

    function statusBadge(s) {
      const map = {
        PENDING_PAYMENT: 'badge-pending',
        BOOKED:          'badge-booked',
        COMPLETED:       'badge-completed',
        CANCELLED:       'badge-cancelled',
        MISSED:          'badge-missed'
      };
      return `<span class="${map[s] || 'badge-pending'}">${s || '—'}</span>`;
    }

    function markComplete(aptId) {
      showConfirmation('Mark Complete', 'Mark this consultation as completed?', async () => {
        try {
          const res = await fetch(API_BASE + '/api/appointments/' + aptId + '/complete', {
            method: 'PUT', headers: authHeaders()
          });
          if (res.ok) {
            showAlert('Success', 'Consultation marked as completed.', () => loadAppointments());
          } else {
            showAlert('Error', 'Error: ' + await res.text());
          }
        } catch (e) {
          showAlert('Error', 'Error: ' + e.message);
        }
      });
    }

    // ── E-Prescription ────────────────────────────────────────────────────
    let ePrescMedicines = [];
    let ePrescSelMedId  = null;
    let ePrescSelMedName = '';
    let medSearchTimer  = null;

    function openEPrescModal(aptId, patientName) {
      ePrescMedicines  = [];
      ePrescSelMedId   = null;
      ePrescSelMedName = '';
      document.getElementById('ePrescAptId').value = aptId;
      document.getElementById('ePrescHeader').innerHTML =
        `<i class="bi bi-person me-1"></i> Patient: <strong>${patientName}</strong> &nbsp;|&nbsp; ` +
        `<i class="bi bi-calendar me-1"></i> Date: <strong>${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</strong>`;
      ['medSearchInput','ePrescDosage','ePrescDuration','ePrescQty','ePrescInst','ePrescWarn'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('medSearchDrop').style.display    = 'none';
      document.getElementById('selectedMedBadge').style.display = 'none';
      document.getElementById('ePrescList').innerHTML            = '';
      document.getElementById('ePrescSubmitBtn').disabled        = true;
      document.getElementById('ePrescModal').classList.add('show');
    }

    function closeEPrescModal() {
      document.getElementById('ePrescModal').classList.remove('show');
    }

    function handleMedSearch() {
      const q = document.getElementById('medSearchInput').value.trim();
      ePrescSelMedId = null;
      document.getElementById('selectedMedBadge').style.display = 'none';
      if (medSearchTimer) clearTimeout(medSearchTimer);
      if (q.length < 2) { document.getElementById('medSearchDrop').style.display = 'none'; return; }
      medSearchTimer = setTimeout(async () => {
        try {
          const meds = await apiGet('/api/medicines/search/' + encodeURIComponent(q));
          renderMedDrop(meds);
        } catch (e) { document.getElementById('medSearchDrop').style.display = 'none'; }
      }, 280);
    }

    function renderMedDrop(meds) {
      const drop = document.getElementById('medSearchDrop');
      if (!meds || !meds.length) { drop.style.display = 'none'; return; }
      drop.innerHTML = meds.map(m =>
        `<div onclick="selectMedForRx(${m.id},'${(m.name||'').replace(/'/g,"\\'")}','${(m.genericName||'').replace(/'/g,"\\'")}','${(m.dosage||'').replace(/'/g,"\\'")}' )"
             style="padding:9px 14px;cursor:pointer;border-bottom:1px solid #eee;font-size:0.9rem;"
             onmouseover="this.style.background='#e8f4ff'" onmouseout="this.style.background=''">
           <strong>${m.name || '—'}</strong>
           ${m.genericName ? `<span style="color:#888;font-size:0.82rem;"> · ${m.genericName}</span>` : ''}
           ${m.type ? `<span style="color:#00b3b3;font-size:0.8rem;margin-left:6px;">${m.type}</span>` : ''}
         </div>`
      ).join('');
      drop.style.display = 'block';
    }

    function selectMedForRx(id, name, genericName, defaultDosage) {
      ePrescSelMedId   = id;
      ePrescSelMedName = name;
      document.getElementById('medSearchInput').value        = name;
      document.getElementById('medSearchDrop').style.display = 'none';
      document.getElementById('selectedMedBadge').textContent =
        'Selected: ' + name + (genericName ? ' (' + genericName + ')' : '');
      document.getElementById('selectedMedBadge').style.display = 'block';
      if (defaultDosage) document.getElementById('ePrescDosage').value = defaultDosage;
      document.getElementById('ePrescDosage').focus();
    }

    function addMedToRx() {
      const typedName = document.getElementById('medSearchInput').value.trim();
      if (!ePrescSelMedId && !typedName) { showAlert('Enter Medicine', 'Please type or select a medicine name.'); return; }
      if (!ePrescSelMedId && typedName) { ePrescSelMedName = typedName; }
      const dosage   = document.getElementById('ePrescDosage').value.trim();
      const duration = document.getElementById('ePrescDuration').value.trim();
      if (!dosage || !duration) { showAlert('Required Fields', 'Dosage and Duration are required.'); return; }

      ePrescMedicines.push({
        medicineId:   ePrescSelMedId,
        medicineName: ePrescSelMedName,
        dosage,
        frequency:    document.getElementById('ePrescFreq').value,
        duration,
        quantity:     parseInt(document.getElementById('ePrescQty').value) || 0,
        instructions: document.getElementById('ePrescInst').value.trim(),
        warnings:     document.getElementById('ePrescWarn').value.trim()
      });

      ePrescSelMedId = null; ePrescSelMedName = '';
      ['medSearchInput','ePrescDosage','ePrescDuration','ePrescQty','ePrescInst','ePrescWarn'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('selectedMedBadge').style.display = 'none';
      renderEPrescList();
      document.getElementById('ePrescSubmitBtn').disabled = false;
    }

    function removeEPrescMed(idx) {
      ePrescMedicines.splice(idx, 1);
      renderEPrescList();
      document.getElementById('ePrescSubmitBtn').disabled = ePrescMedicines.length === 0;
    }

    function renderEPrescList() {
      const list = document.getElementById('ePrescList');
      if (!ePrescMedicines.length) { list.innerHTML = ''; return; }
      list.innerHTML =
        `<div style="background:#f5fafa;border-radius:8px;padding:12px 14px;border:1.5px solid #c8e8e8;">
           <strong style="font-size:0.85rem;color:#005580;">Added Medicines (${ePrescMedicines.length})</strong>` +
        ePrescMedicines.map((m, i) =>
          `<div style="display:flex;align-items:flex-start;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e8f4ff;">
             <div>
               <span style="font-weight:700;font-size:0.9rem;">${m.medicineName}</span>
               <span style="color:#666;font-size:0.82rem;"> · ${m.dosage} · ${m.frequency} · ${m.duration}</span>
               ${m.instructions ? `<span style="color:#888;font-size:0.8rem;"> | ${m.instructions}</span>` : ''}
             </div>
             <button onclick="removeEPrescMed(${i})" style="background:none;border:none;color:#e74c3c;cursor:pointer;font-size:1.2rem;padding:0 4px;line-height:1;">×</button>
           </div>`
        ).join('') +
        '</div>';
    }

    async function submitEPrescription() {
      const aptId = parseInt(document.getElementById('ePrescAptId').value);
      if (!ePrescMedicines.length) { showAlert('No Medicines', 'Add at least one medicine before submitting.'); return; }
      const btn = document.getElementById('ePrescSubmitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Issuing…';
      try {
        for (const m of ePrescMedicines) {
          await createPrescription(aptId, m.medicineId, m.medicineName, m.dosage, m.frequency, m.duration, m.quantity, m.instructions, m.warnings);
        }
        closeEPrescModal();
        showAlert('Prescription Issued',
          `E-Prescription with ${ePrescMedicines.length} medicine${ePrescMedicines.length > 1 ? 's' : ''} issued successfully.`);
      } catch (e) {
        showAlert('Error', 'Failed to issue prescription: ' + e.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-send me-1"></i> Issue Prescription';
      }
    }

    // ── FEAT-01: Cancel appointment with refund (context-aware) ──────────────────────────
    function confirmCancel(aptId) {
      // Find appointment from global data
      const appointment = globalAppointments.find(a => a.id === aptId);
      if (!appointment) {
        showAlert('Not Found', 'Appointment not found.');
        return;
      }

      const patientName = globalPatientNames[appointment.patientId] || ('Patient #' + appointment.patientId);
      const aptTime = parseAptTime(appointment.appointmentTime);
      const formattedTime = aptTime.toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });

      let title = '';
      let message = '';

      if (appointment.status === 'BOOKED') {
        // Use actual doctor's consultation fee
        const doctorFee = doctorConsultationFee || 500;
        const refundAmount = doctorFee; // Doctor cancellation = 100% refund

        title = 'Cancel Appointment?';
        message = `Patient: ${patientName}\n` +
          `Appointment: ${formattedTime}\n\n` +
          `REFUND DETAILS (Doctor Cancellation):\n` +
          `Consultation Fee: ₹${doctorFee}\n` +
          `Refund Amount (100%): ₹${refundAmount}\n\n` +
          `Patient will receive the full refund within 24 hours.\n` +
          `The appointment slot will be released for other bookings.`;
      } else if (appointment.status === 'PENDING_PAYMENT') {
        title = 'Cancel Appointment?';
        message = `Patient: ${patientName}\n` +
          `Appointment: ${formattedTime}\n\n` +
          `REFUND DETAILS:\n` +
          `Status: PENDING_PAYMENT\n` +
          `No refund will be issued (payment was not confirmed)\n\n` +
          `The appointment slot will be released for other bookings.`;
      } else {
        showAlert('Cannot Cancel', `Cannot cancel appointment with status: ${appointment.status}\n\nOnly BOOKED or PENDING_PAYMENT appointments can be cancelled.`);
        return;
      }

      showConfirmation(title, message, () => {
        cancelAppointment(aptId);
      });
    }

    async function cancelAppointment(aptId) {
      try {
        const reason = 'Doctor initiated cancellation';
        const res = await fetch(API_BASE + '/api/appointments/' + aptId + '?reason=' + encodeURIComponent(reason), {
          method: 'DELETE', headers: authHeaders()
        });
        if (res.ok) {
          const data = await res.json();
          // Use backend message which includes refund and slot release details
          const msg = data.message || 'Appointment cancelled successfully.';
          showAlert('Success', msg, () => loadAppointments());
        } else {
          showAlert('Error', 'Cancellation failed: ' + await res.text());
        }
      } catch (e) {
        showAlert('Error', 'Error: ' + e.message);
      }
    }

    loadAppointments();

    // Auto-refresh every 30 s so Join Call buttons unlock automatically
    setInterval(loadAppointments, 30000);

    // ── Live countdown ticker (updates every 60 s between full reloads) ──
    // Updates the label on every disabled "Opens in …" button directly
    // in the DOM, so the counter ticks down smoothly without a full re-render.
    // When any countdown reaches the 10-min window it triggers an immediate
    // loadAppointments() call to swap the button to an active "Join Call" link.
    function tickCountdowns() {
      const now    = Date.now();
      const tenMin = 10 * 60 * 1000;
      let   unlock = false;
      document.querySelectorAll('[data-countdown]').forEach(btn => {
        const aptMs  = parseInt(btn.dataset.countdown, 10);
        const diffMs = aptMs - now;
        if (diffMs <= tenMin) {
          unlock = true;        // this appointment is now joinable
        } else {
          const h   = Math.floor(diffMs / 3600000);
          const m   = Math.floor((diffMs % 3600000) / 60000);
          const lbl = h > 0 ? `Opens in ${h}h ${m}m` : `Opens in ${m}m`;
          const sp  = btn.querySelector('.cd-label');
          if (sp) sp.textContent = lbl;
        }
      });
      if (unlock) loadAppointments();   // re-render to show active Join Call button
    }
    setInterval(tickCountdowns, 60000);

  </script>
</body>
