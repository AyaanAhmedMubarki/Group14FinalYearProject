<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile – MediConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
            color: #333;
        }

        .container {
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            margin-top: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #007bff;
            font-weight: bold;
        }

        h4 {
            color: #343a40;
            font-weight: bold;
        }

        .profile-section img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid #007bff;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        .profile-info {
            margin-top: 20px;
        }

        .profile-info p {
            font-size: 1.1rem;
            line-height: 1.7;
        }

        .edit-form {
            display: none;
        }

        .form-group img {
            max-width: 150px;
            margin-top: 10px;
            border-radius: 50%;
            display: block;
        }

        .btn-custom {
            background-color: #007bff;
            color: white;
            font-weight: 600;
            border-radius: 8px;
        }

        .btn-custom:hover {
            background-color: #0056b3;
        }

        nav a {
            text-decoration: none;
            font-weight: 600;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .label {
            font-weight: 600;
            color: #555;
        }
    </style>
</head>

<body>
<div class="container mt-4">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center">
        <h1>Admin Profile</h1>
        <nav>
            <a href="admin.html" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left"></i> Back to Dashboard
            </a>
        </nav>
    </div>
    <hr>

    <!-- Profile Section -->
    <div class="profile-section d-flex align-items-center">
        <img id="profile-img" src="images/admin-avatar.png" alt="Admin Picture">
        <div class="ms-4">
            <h3 id="admin-name">Dr. Alex Morgan</h3>
            <div class="profile-info">
                <p><span class="label">Role:</span> System Administrator</p>
                <p><span class="label">Experience:</span> 10 Years</p>
                <p><span class="label">Contact:</span> admin@mediconnect.com</p>
                <p><span class="label">Managed Departments:</span> Doctors, Patients, Appointments, Payments</p>
            </div>
            <button class="btn btn-warning" id="edit-profile-btn">
                <i class="bi bi-pencil-square"></i> Edit Profile
            </button>
        </div>
    </div>

    <!-- Edit Profile Form -->
    <div class="edit-form mt-4">
        <h4><i class="bi bi-person-lines-fill"></i> Edit Profile</h4>
        <form id="edit-profile-form">
            <div class="mb-3">
                <label for="edit-name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="edit-name" value="Dr. Alex Morgan">
            </div>
            <div class="mb-3">
                <label for="edit-role" class="form-label">Role</label>
                <input type="text" class="form-control" id="edit-role" value="System Administrator">
            </div>
            <div class="mb-3">
                <label for="edit-experience" class="form-label">Experience (Years)</label>
                <input type="number" class="form-control" id="edit-experience" value="10">
            </div>
            <div class="mb-3">
                <label for="edit-contact" class="form-label">Contact Email</label>
                <input type="email" class="form-control" id="edit-contact" value="admin@mediconnect.com">
            </div>
            <div class="mb-3">
                <label for="edit-departments" class="form-label">Managed Departments</label>
                <input type="text" class="form-control" id="edit-departments" value="Doctors, Patients, Appointments, Payments">
            </div>
            <div class="mb-3">
                <label for="edit-image" class="form-label">Profile Image</label>
                <input type="file" class="form-control" id="edit-image">
                <img id="preview-img" src="images/admin-avatar.png" alt="Preview Image" class="mt-3">
            </div>
            <button type="submit" class="btn btn-success btn-custom">Save Changes</button>
        </form>
    </div>
</div>

<script>
    // Show edit form
    document.getElementById('edit-profile-btn').addEventListener('click', function () {
        document.querySelector('.profile-info').style.display = 'none';
        document.getElementById('edit-profile-btn').style.display = 'none';
        document.querySelector('.edit-form').style.display = 'block';
    });

    // Preview new image
    document.getElementById('edit-image').addEventListener('change', function (event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                document.getElementById('preview-img').src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    });

    // Save and update profile
    document.getElementById('edit-profile-form').addEventListener('submit', function (event) {
        event.preventDefault();
        const updatedProfile = {
            name: document.getElementById('edit-name').value,
            role: document.getElementById('edit-role').value,
            experience: document.getElementById('edit-experience').value,
            contact: document.getElementById('edit-contact').value,
            departments: document.getElementById('edit-departments').value,
            image: document.getElementById('preview-img').src
        };

        localStorage.setItem('adminProfile', JSON.stringify(updatedProfile));

        document.getElementById('admin-name').textContent = updatedProfile.name;
        document.getElementById('profile-img').src = updatedProfile.image;
        document.querySelector('.profile-info').innerHTML = `
            <p><span class="label">Role:</span> ${updatedProfile.role}</p>
            <p><span class="label">Experience:</span> ${updatedProfile.experience} Years</p>
            <p><span class="label">Contact:</span> ${updatedProfile.contact}</p>
            <p><span class="label">Managed Departments:</span> ${updatedProfile.departments}</p>
        `;

        document.querySelector('.edit-form').style.display = 'none';
        document.querySelector('.profile-info').style.display = 'block';
        document.getElementById('edit-profile-btn').style.display = 'inline-block';
    });

    // Load from localStorage
    window.onload = function () {
        const profileData = JSON.parse(localStorage.getItem('adminProfile'));
        if (profileData) {
            document.getElementById('admin-name').textContent = profileData.name || 'Dr. Alex Morgan';
            document.getElementById('profile-img').src = profileData.image || 'images/admin-avatar.png';
            document.querySelector('.profile-info').innerHTML = `
                <p><span class="label">Role:</span> ${profileData.role || 'System Administrator'}</p>
                <p><span class="label">Experience:</span> ${profileData.experience || '10 Years'}</p>
                <p><span class="label">Contact:</span> ${profileData.contact || 'admin@mediconnect.com'}</p>
                <p><span class="label">Managed Departments:</span> ${profileData.departments || 'Doctors, Patients, Appointments, Payments'}</p>
            `;
        }
    };
</script>
</body>

</html>
