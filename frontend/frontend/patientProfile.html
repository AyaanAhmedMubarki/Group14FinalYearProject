<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Profile – MediConnectX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f4f9f9; }
    .top-navbar {
      background-color: #006666; padding: 0.8rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .top-navbar .brand { color: #fff; font-size: 1.4rem; font-weight: bold; text-decoration: none; }
    .top-navbar a { color: #fff; text-decoration: none; margin-left: 20px; font-size: 0.95rem; }
    .top-navbar a:hover { color: #00e6e6; }
    .container { background: #fff; border-radius: 10px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); margin-top: 25px; }
    h1, h4 { color: #006666; font-weight: bold; }
    .profile-section img { width: 150px; height: 150px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 4px solid #00b3b3; object-fit: cover; }
    .profile-button { background-color: #006666; color: white; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; margin-top: 15px; }
    .profile-button:hover { background-color: #008080; }
    .edit-form-container { display: none; margin-top: 25px; }
    .form-label { font-weight: 600; color: #444; }
    footer { text-align: center; margin-top: 30px; padding: 15px; background: #006666; color: white; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="top-navbar">
    <a href="PatientHome.html" class="brand">MediConnectX – Patient</a>
    <div>
      <a href="PatientHome.html">Home</a>
      <a href="Patient.html">Dashboard</a>
      <a href="PatientProfile.html">Profile</a>
      <a href="PatientEvents.html">Events</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </div>

  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center">
      <h1>Patient Profile</h1>
      <a href="Patient.html" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Dashboard</a>
    </div>
    <hr>

    <!-- View Section -->
    <div class="profile-section d-flex align-items-center mt-4" id="viewSection">
      <img id="profileImg" src="https://via.placeholder.com/150" alt="Patient Picture">
      <div class="ms-4">
        <h3 id="profileName">—</h3>
        <p>
          <strong>Date of Birth:</strong> <span id="viewDob">—</span><br>
          <strong>Gender:</strong> <span id="viewGender">—</span><br>
          <strong>Height:</strong> <span id="viewHeight">—</span><br>
          <strong>Weight:</strong> <span id="viewWeight">—</span><br>
          <strong>Category:</strong> <span id="viewCategory">—</span><br>
          <strong>Email:</strong> <span id="viewEmail">—</span>
        </p>
        <button class="profile-button" onclick="showEdit()"><i class="bi bi-pencil-square"></i> Edit Profile</button>
      </div>
    </div>

    <!-- Edit Form -->
    <div class="edit-form-container" id="editForm">
      <h4>Edit Profile</h4>
      <form id="editProfileForm" onsubmit="saveProfile(event)">
        <div class="mb-3">
          <label class="form-label">Profile Picture</label>
          <input type="file" class="form-control" id="editImage" accept="image/*" onchange="previewImg()">
          <img id="imgPreview" src="" class="mt-2 rounded-circle" style="width:100px;height:100px;object-fit:cover;display:none;">
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Date of Birth</label>
            <input type="date" class="form-control" id="editDob">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" id="editGender">
              <option value="">Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Height (cm)</label>
            <input type="number" class="form-control" id="editHeight" min="0">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Weight (kg)</label>
            <input type="number" class="form-control" id="editWeight" min="0">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Category / Speciality</label>
            <input type="text" class="form-control" id="editCategory" placeholder="e.g. Cardiology, General">
          </div>
        </div>
        <button type="submit" class="profile-button" id="saveBtn">Save Changes</button>
        <button type="button" class="btn btn-secondary ms-2" onclick="hideEdit()">Cancel</button>
      </form>
    </div>

    <footer>© 2026 MediConnectX – Smart Medical Management System</footer>
  </div>

  <script src="api.js"></script>
  <script>
    const auth = requireAuth('PATIENT');
    let currentProfile = {};

    async function loadProfile() {
      try {
        const d = await apiGet('/api/patient/profile?email=' + encodeURIComponent(auth.email));
        currentProfile = d;
        document.getElementById('profileName').textContent = d.name || auth.name;
        document.getElementById('viewDob').textContent = d.birthDate || '—';
        document.getElementById('viewGender').textContent = d.gender || '—';
        document.getElementById('viewHeight').textContent = d.height ? d.height + ' cm' : '—';
        document.getElementById('viewWeight').textContent = d.weight ? d.weight + ' kg' : '—';
        document.getElementById('viewCategory').textContent = d.category || '—';
        document.getElementById('viewEmail').textContent = d.email || auth.email;
        if (d.imageLink) document.getElementById('profileImg').src = imgSrc(d.imageLink);
        // pre-fill edit form
        document.getElementById('editDob').value = d.birthDate || '';
        document.getElementById('editGender').value = d.gender || '';
        document.getElementById('editHeight').value = d.height || '';
        document.getElementById('editWeight').value = d.weight || '';
        document.getElementById('editCategory').value = d.category || '';
      } catch (e) {
        document.getElementById('profileName').textContent = auth.name;
        document.getElementById('viewEmail').textContent = auth.email;
      }
    }

    function showEdit() { document.getElementById('editForm').style.display = 'block'; }
    function hideEdit() { document.getElementById('editForm').style.display = 'none'; }

    function previewImg() {
      const file = document.getElementById('editImage').files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const prev = document.getElementById('imgPreview');
        prev.src = e.target.result;
        prev.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    async function saveProfile(e) {
      e.preventDefault();
      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = 'Saving...';
      const dto = {
        birthDate: document.getElementById('editDob').value,
        gender: document.getElementById('editGender').value,
        height: parseInt(document.getElementById('editHeight').value) || null,
        weight: parseInt(document.getElementById('editWeight').value) || null,
        category: document.getElementById('editCategory').value
      };
      const fd = new FormData();
      fd.append('PatientDTO', JSON.stringify(dto));
      const imgFile = document.getElementById('editImage').files[0];
      if (imgFile) fd.append('imageLink', imgFile);
      try {
        await apiFormPut('/api/patient/profile?email=' + encodeURIComponent(auth.email), fd);
        alert('Profile updated successfully!');
        hideEdit();
        loadProfile();
      } catch (err) {
        alert('Error saving profile: ' + err.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Save Changes';
      }
    }

    loadProfile();
  </script>
</body>
</html>
